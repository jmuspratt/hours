<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)">
  <title>Hours</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
  <div id="filter-bar">
    <div id="title-row">
      <div id="app-title">Hours</div>
      <div id="title-actions">
        <button id="clear-btn">Reset filters</button>
        <button id="edit-cancel-btn" hidden>Cancel</button>
        <button id="edit-btn">Manage</button>
      </div>
    </div>
    <div id="filter-row">
      <div id="filter-scroll"></div>
      <button id="open-now-btn">Open Now</button>
    </div>
  </div>
  <ul id="business-list"></ul>
  <div id="onboarding" hidden>
    <p>Save a list of your favorite places and see what’s open when.</p>
    <p class="a2hs-hint" hidden>iPhone users: before saving any places, save this page to your home screen via <strong<Share → Add to Home Screen</strong>. Safari and the Home Screen app keep separate lists.</p>
    <button id="onboarding-add-btn" class="cta-btn">Add a place...</button>
  </div>
  <div id="edit-panel" hidden>
    <div id="edit-tabs">
      <div id="edit-tab-switcher">
        <button class="edit-tab-btn" data-tab="search">Search</button>
        <button class="edit-tab-btn active" data-tab="current">Your places</button>
      </div>
    </div>
    <div id="edit-tab-current" class="edit-tab-panel">
      <ul id="edit-current"></ul>
    </div>
    <div id="edit-tab-search" class="edit-tab-panel" hidden>
      <div id="edit-search-row">
        <input id="edit-query" type="text" placeholder="Joe’s Coffee">
        <input id="edit-zip" type="text" inputmode="numeric" placeholder="Zip (optional)" maxlength="10">
        <button id="edit-search-btn">Search</button>
      </div>
      <ul id="edit-results"></ul>
    </div>
  </div>
  <div id="version-footer">Version 1.0</div>
  <script src="app.js" type="module"></script>
</body>
</html>
