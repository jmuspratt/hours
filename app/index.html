<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)">
  <title>Hours</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
  <div id="filter-bar">
    <div id="title-row">
      <div id="app-title">Hours</div>
      <button id="edit-btn">Settings</button>
    </div>
    <div id="filter-row">
      <div id="filter-scroll"></div>
      <button id="clear-btn">Reset</button>
    </div>
  </div>
  <ul id="business-list"></ul>
  <div id="edit-panel" hidden>
    <div id="edit-tabs">
      <button class="edit-tab-btn active" data-tab="current">Saved</button>
      <button class="edit-tab-btn" data-tab="search">Add...</button>
    </div>
    <div id="edit-tab-current" class="edit-tab-panel">
      <ul id="edit-current"></ul>
    </div>
    <div id="edit-tab-search" class="edit-tab-panel" hidden>
      <div id="edit-search-row">
        <input id="edit-query" type="text" placeholder="Search to add...">
        <input id="edit-zip" type="text" inputmode="numeric" placeholder="Zip (optional)" maxlength="10">
        <button id="edit-search-btn">Search</button>
      </div>
      <ul id="edit-results"></ul>
    </div>
  </div>
  <p id="updated-label"></p>
  <script src="app.js" type="module"></script>
</body>
</html>
